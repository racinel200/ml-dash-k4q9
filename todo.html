<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Board — Massage &amp; Lymphatic by Kaitlyn</title>
<style>
  :root{--sage:#5a7a5e;--sage-d:#2f5233;--cream:#faf7f0;--card:#ffffff;--ink:#2c342d;--muted:#7c877e;--gold:#c9a86a;--rose:#c97b6a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Georgia','Times New Roman',serif;background:var(--cream);color:var(--ink);padding:32px 20px;}
  .wrap{max-width:700px;margin:0 auto}
  header{text-align:center;margin-bottom:10px}
  header h1{font-size:24px;letter-spacing:2px;color:var(--sage-d);text-transform:uppercase}
  header p{color:var(--muted);font-size:14px;margin-top:6px}
  .backlink{text-align:center;margin-bottom:24px}
  .backlink a{display:inline-block;background:#fff;border:1px solid #d8e0d8;color:var(--sage-d);border-radius:20px;padding:7px 18px;font-size:13px;text-decoration:none;margin:3px 4px}
  .backlink a:hover{background:var(--sage-d);color:#fff}
  .panel{background:var(--card);border-radius:14px;padding:24px;box-shadow:0 2px 10px rgba(47,82,51,.08);margin-bottom:22px}
  .panel h2{font-size:16px;color:var(--sage-d);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
  .tabs{display:flex;border-bottom:2px solid #edf0ea;margin-bottom:8px}
  .tabs button{font-family:inherit;flex:1;background:none;border:none;padding:12px 4px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tabs button.active{color:var(--sage-d);border-bottom-color:var(--sage-d);font-weight:bold}
  .tabs button .count{display:inline-block;background:#e7ede7;color:var(--sage-d);border-radius:10px;padding:0 8px;font-size:11px;margin-left:5px}
  .cats{margin:10px 0 4px;text-align:center}
  .cats button{font-family:inherit;background:#f4f1e8;border:1px solid #e4e0d2;color:var(--muted);border-radius:14px;padding:4px 12px;font-size:12px;margin:3px 2px;cursor:pointer}
  .cats button.active{background:var(--sage-d);border-color:var(--sage-d);color:#fff}
  .prio-head{font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:16px 0 2px;padding-bottom:4px;border-bottom:1px dashed #e4e0d2}
  .prio-1{color:var(--rose)}
  .prio-2{color:var(--gold)}
  .prio-3{color:var(--sage)}
  .task{display:flex;align-items:flex-start;gap:14px;padding:13px 6px;border-bottom:1px solid #f0ede4;cursor:pointer}
  .task:last-child{border-bottom:none}
  .task .box{flex:0 0 26px;height:26px;border:2px solid var(--sage);border-radius:50%;margin-top:1px;position:relative;transition:all .15s}
  .task.p1 .box{border-color:var(--rose)}
  .task.done .box{background:var(--sage);border-color:var(--sage)}
  .task.done .box:after{content:'\2713';color:#fff;position:absolute;top:0;left:6px;font-size:16px}
  .task .txt{font-size:15.5px;line-height:1.5}
  .task.done .txt{text-decoration:line-through;color:var(--muted)}
  .task .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .chip{display:inline-block;background:#eef3ee;color:var(--sage-d);border-radius:10px;padding:1px 9px;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-right:6px}
  .askclaude{display:inline-block;color:#b0602f;background:#faf3ec;border:1px solid #ecd9c8;border-radius:10px;padding:1px 9px;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;margin-left:8px}
  .askclaude:hover{background:#b0602f;color:#fff;border-color:#b0602f}
  .task .undo{margin-left:auto;font-size:12px;color:var(--muted);border:none;background:none;cursor:pointer;font-family:inherit;text-decoration:underline}
  .action{display:flex;gap:12px;padding:12px 6px;border-bottom:1px solid #f0ede4}
  .action:last-child{border-bottom:none}
  .action .dot{flex:0 0 10px;height:10px;border-radius:50%;background:var(--gold);margin-top:7px}
  .action .txt{font-size:14.5px;line-height:1.5}
  .action .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .empty{color:var(--muted);text-align:center;padding:18px 0;font-size:15px}
  textarea{width:100%;min-height:90px;font-family:inherit;font-size:15px;padding:12px;border:1px solid #d8e0d8;border-radius:10px;background:#fdfcf9;resize:vertical}
  .sendrow{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .sendrow small{color:var(--muted)}
  button.send{font-family:inherit;background:var(--sage-d);color:#fff;border:none;border-radius:20px;padding:10px 28px;font-size:14px;letter-spacing:1px;cursor:pointer}
  button.send:disabled{opacity:.5}
  .note{padding:10px 6px;border-bottom:1px solid #f0ede4;font-size:14px}
  .note:last-child{border-bottom:none}
  .note .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  #status{text-align:center;padding:30px;color:var(--muted)}
  #status.error{color:var(--rose)}
  #content{display:none}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sage-d);color:#fff;border-radius:20px;padding:10px 24px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .fab{position:fixed;bottom:26px;right:26px;width:58px;height:58px;border-radius:50%;background:var(--sage-d);color:#fff;border:none;font-size:30px;line-height:1;cursor:pointer;box-shadow:0 4px 14px rgba(47,82,51,.35);z-index:40;font-family:inherit}
  .fab:hover{background:var(--sage)}
  .overlay{position:fixed;inset:0;background:rgba(44,52,45,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--card);border-radius:16px;padding:26px;max-width:460px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .modal h2{font-size:16px;color:var(--sage-d);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
  .modal label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
  .modal input[type=text]{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid #d8e0d8;border-radius:10px;background:#fdfcf9}
  .pick{display:flex;flex-wrap:wrap;gap:6px}
  .pick button{font-family:inherit;background:#f4f1e8;border:1px solid #e4e0d2;color:var(--muted);border-radius:14px;padding:7px 14px;font-size:13px;cursor:pointer}
  .pick button.active{background:var(--sage-d);border-color:var(--sage-d);color:#fff}
  .pick button.p1.active{background:var(--rose);border-color:var(--rose)}
  .pick button.p2.active{background:var(--gold);border-color:var(--gold)}
  .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .modal .cancel{font-family:inherit;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Your To-Do Board</h1>
    <p>Massage &amp; Lymphatic by Kaitlyn &middot; refreshed every morning at 8am</p>
  </header>
  <div class="backlink">
    <a href="index.html">&larr; Sales Dashboard</a>
    <a href="https://us02.vagaro.com/merchants/calendar/v3" target="_blank" rel="noopener">&#128197; Vagaro</a>
    <a href="https://mail.google.com" target="_blank" rel="noopener">&#9993; Gmail</a>
  </div>

  <div id="status">Loading your list&hellip;</div>

  <div id="content">
    <div class="panel">
      <div class="tabs">
        <button data-tab="todo" class="active">To Do<span class="count" id="n-todo"></span></button>
        <button data-tab="done">Done</button>
        <button data-tab="actions">Claude&rsquo;s Actions</button>
      </div>
      <div class="cats" id="cats" style="display:none"></div>
      <div id="tabbody"></div>
    </div>

    <div class="panel">
      <h2>Leave a note for your assistant</h2>
      <textarea id="notebox" placeholder="Anything on your mind — approve a promo, ask a question, share news. It gets read every morning."></textarea>
      <div class="sendrow">
        <small>Read daily at 8am</small>
        <button class="send" id="sendbtn">Send note</button>
      </div>
      <div id="notes" style="margin-top:16px"></div>
    </div>

    <footer id="footer"></footer>
  </div>
</div>
<button class="fab" id="fab" title="Add a to-do">+</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Add a to-do</h2>
    <label>What needs doing?</label>
    <input type="text" id="newtask" maxlength="140" placeholder="e.g. Order more massage oil">
    <label>Priority</label>
    <div class="pick" id="prioPick">
      <button class="p1" data-p="1">Do first</button>
      <button class="p2 active" data-p="2">This week</button>
      <button class="p3" data-p="3">When you can</button>
    </div>
    <label>Category</label>
    <div class="pick" id="catPick">
      <button data-c="Clients & Rebooking">Clients &amp; Rebooking</button>
      <button data-c="Reviews">Reviews</button>
      <button data-c="Marketing">Marketing</button>
      <button data-c="Money">Money</button>
      <button data-c="Outreach">Outreach</button>
      <button data-c="Studio">Studio</button>
      <button data-c="General" class="active">General</button>
    </div>
    <div class="actions">
      <button class="cancel" id="modalCancel">Cancel</button>
      <button class="send" id="modalAdd">Add it</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbxiO7yPA6h89WK-GKJAfZyavdic4VMeAvgP9kkWvVD_aJlcjCl1KVZTwnHQG_CxxPeE/exec';
const KEY='mlk-ops-2026';
const call=params=>fetch(API+'?k='+KEY+'&'+new URLSearchParams(params).toString()).then(r=>r.json());
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate=s=>{const d=new Date(s);return isNaN(d)?String(s).slice(0,10):d.toLocaleDateString('en',{month:'short',day:'numeric'});};
const fmtDT=s=>{const d=new Date(s);return isNaN(d)?String(s).slice(0,16):d.toLocaleDateString('en',{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'});};
const PRIO_LABEL={1:'Do first',2:'This week',3:'When you can'};

// Config: live values come from the "Config" tab of the Ops Board spreadsheet
// (key/value rows; edit the cell, no redeploy needed). These are the fallbacks.
const CONFIG={
  contextTemplate:'You\'re helping Kaitlyn, a licensed massage therapist and certified lymphatic drainage (MLD) practitioner who runs a solo studio, "Massage & Lymphatic by Kaitlyn," in Buda, TX, serving greater Austin. Clients book through Vagaro; her site is massageandlymphatic.com. Services: 90-min/2-hr all-inclusive Intentional Massage Experience ($195/$285), lymphatic and pre/post-op massage ($115/hr), session packages ($555-$1,250), memberships ($175/mo). She\'s actively growing her client base. She\'s not technical - give simple, practical, step-by-step help with ready-to-use wording (scripts, texts, captions) she can copy.\n\nHer to-do right now (category: {category}, priority: {priority}): {task}\n\nHelp her get this done today.',
  projectId:''
};
const CONFIG_URL='https://docs.google.com/spreadsheets/d/1IQeC8UFB_tiNjWWit4kefHqqq_-i_2ZSdIJ8YDDEElM/gviz/tq?tqx=out:csv&sheet=Config';
async function loadConfig(){
  try{
    const text=await fetch(CONFIG_URL).then(r=>r.text());
    if(text.trim().startsWith('<')) return; // sheet not shared yet — keep defaults
    parseCSV(text).forEach(row=>{
      const k=(row[0]||'').trim(), v=(row[1]||'').trim();
      if(k && k!=='key' && v && CONFIG.hasOwnProperty(k)) CONFIG[k]=v.replace(/\\n/g,'\n');
    });
  }catch(e){}
}
function claudeUrl(t){
  const prompt=CONFIG.contextTemplate
    .replace(/\{task\}/g,t.text)
    .replace(/\{category\}/g,t.cat)
    .replace(/\{priority\}/g,PRIO_LABEL[t.p].toLowerCase());
  return 'https://claude.ai/new?q='+encodeURIComponent(prompt)
    +(CONFIG.projectId?'&project='+encodeURIComponent(CONFIG.projectId):'');
}
let DATA={tasks:[],notes:[]};
let TAB='todo', CAT='All';

function parseTask(raw){
  const m=String(raw).match(/^\[P([123])\]\s*\[([^\]]+)\]\s*(.*)$/s);
  if(m) return {p:+m[1],cat:m[2].trim(),text:m[3].trim()};
  const m2=String(raw).match(/^\[P([123])\]\s*(.*)$/s);
  if(m2) return {p:+m2[1],cat:'General',text:m2[2].trim()};
  return {p:2,cat:'General',text:String(raw)};
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function draw(){
  const open=DATA.tasks.filter(t=>t.status==='open').map(t=>({...t,...parseTask(t.task)}));
  const done=DATA.tasks.filter(t=>t.status==='done').slice(-15).reverse().map(t=>({...t,...parseTask(t.task)}));
  const actions=DATA.notes.filter(n=>n.by==='bot-action').slice(-25).reverse();
  document.getElementById('n-todo').textContent=open.length||'';

  // category filter chips (To Do tab only)
  const catsEl=document.getElementById('cats');
  if(TAB==='todo'&&open.length){
    const cats=['All',...new Set(open.map(t=>t.cat))];
    catsEl.style.display='block';
    if(!cats.includes(CAT)) CAT='All';
    catsEl.innerHTML=cats.map(c=>`<button class="${c===CAT?'active':''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`).join('');
  } else { catsEl.style.display='none'; }

  let html='';
  if(TAB==='todo'){
    const vis=open.filter(t=>CAT==='All'||t.cat===CAT);
    if(!vis.length){ html='<div class="empty">Nothing on your list — enjoy your day.</div>'; }
    else {
      for(const p of [1,2,3]){
        const grp=vis.filter(t=>t.p===p);
        if(!grp.length) continue;
        html+=`<div class="prio-head prio-${p}">${PRIO_LABEL[p]}</div>`;
        html+=grp.map(t=>
          `<div class="task p${t.p}" onclick="mark('${esc(t.id)}')">
             <div class="box"></div>
             <div><div class="txt">${esc(t.text)}</div>
             <div class="meta"><span class="chip">${esc(t.cat)}</span>added ${fmtDate(t.added)}<a class="askclaude" href="${claudeUrl(t)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Do it with Claude &#8599;</a></div></div>
           </div>`).join('');
      }
    }
  } else if(TAB==='done'){
    html=done.length?done.map(t=>
      `<div class="task done">
         <div class="box"></div>
         <div><div class="txt">${esc(t.text)}</div>
         <div class="meta"><span class="chip">${esc(t.cat)}</span>done ${fmtDate(t.doneDate)}</div></div>
         <button class="undo" onclick="event.stopPropagation();unmark('${esc(t.id)}')">undo</button>
       </div>`).join('')
      :'<div class="empty">Nothing finished yet.</div>';
  } else {
    html=actions.length?actions.map(a=>
      `<div class="action">
         <div class="dot"></div>
         <div><div class="txt">${esc(a.note)}</div><div class="meta">${fmtDT(a.ts)}</div></div>
       </div>`).join('')
      :'<div class="empty">No actions recorded yet — they&rsquo;ll appear after the next morning run.</div>';
  }
  document.getElementById('tabbody').innerHTML=html;

  const myNotes=DATA.notes.filter(n=>n.by==='kaitlyn').slice(-5).reverse();
  document.getElementById('notes').innerHTML=myNotes.length
    ?'<h2 style="font-size:13px;margin-bottom:6px">Recent notes</h2>'+myNotes.map(n=>
      `<div class="note">${esc(n.note)}<div class="meta">${fmtDT(n.ts)}</div></div>`).join('')
    :'';
  document.getElementById('footer').textContent='Loaded '+new Date().toLocaleString();
}
function setCat(c){CAT=c;draw();}

document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); TAB=b.dataset.tab; draw();
}));

async function refresh(){
  try{
    const [data]=await Promise.all([call({action:'list'}),loadConfig()]);
    DATA=data;
    if(DATA.error) throw new Error(DATA.error);
    document.getElementById('status').style.display='none';
    document.getElementById('content').style.display='block';
    draw();
  }catch(e){
    const st=document.getElementById('status');
    st.className='error';
    st.textContent='Couldn’t load the list — check your connection and refresh.';
  }
}

async function mark(id){
  const t=DATA.tasks.find(x=>x.id===id); if(!t) return;
  t.status='done'; t.doneDate=new Date().toISOString(); draw();
  try{ const r=await call({action:'done',id}); if(r.error) throw 0; toast('Nice — marked done.'); }
  catch(e){ t.status='open'; draw(); toast('Hmm, that didn’t save — try again.'); }
}
async function unmark(id){
  const t=DATA.tasks.find(x=>x.id===id); if(!t) return;
  t.status='open'; t.doneDate=''; draw();
  try{ const r=await call({action:'undone',id}); if(r.error) throw 0; }
  catch(e){ t.status='done'; draw(); toast('That didn’t save — try again.'); }
}
document.getElementById('sendbtn').addEventListener('click', async ()=>{
  const box=document.getElementById('notebox');
  const text=box.value.trim(); if(!text) return;
  const btn=document.getElementById('sendbtn'); btn.disabled=true;
  try{
    const r=await call({action:'note',text,by:'kaitlyn'});
    if(r.error) throw 0;
    box.value=''; toast('Note sent — it’ll be read in the morning.');
    DATA.notes.push({ts:new Date().toISOString(),note:text,by:'kaitlyn'}); draw();
  }catch(e){ toast('Couldn’t send — try again.'); }
  btn.disabled=false;
});
// add-task modal
const overlay=document.getElementById('overlay');
let NEWP='2', NEWC='General';
document.getElementById('fab').addEventListener('click',()=>{
  overlay.classList.add('show');
  setTimeout(()=>document.getElementById('newtask').focus(),50);
});
document.getElementById('modalCancel').addEventListener('click',()=>overlay.classList.remove('show'));
overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.classList.remove('show'); });
document.querySelectorAll('#prioPick button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#prioPick button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); NEWP=b.dataset.p;
}));
document.querySelectorAll('#catPick button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#catPick button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); NEWC=b.dataset.c;
}));
document.getElementById('modalAdd').addEventListener('click', async ()=>{
  const inp=document.getElementById('newtask');
  const text=inp.value.trim(); if(!text){ inp.focus(); return; }
  const btn=document.getElementById('modalAdd'); btn.disabled=true;
  const full='[P'+NEWP+']['+NEWC+'] '+text;
  try{
    const r=await call({action:'add',task:full,by:'kaitlyn'});
    if(r.error) throw 0;
    DATA.tasks.push({id:r.id||('tmp'+Date.now()),added:new Date().toISOString(),task:full,status:'open',doneDate:'',by:'kaitlyn'});
    inp.value=''; overlay.classList.remove('show'); TAB='todo';
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab==='todo'));
    draw(); toast('Added to your list.');
  }catch(e){ toast('Couldn’t add — try again.'); }
  btn.disabled=false;
});
document.getElementById('newtask').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('modalAdd').click(); });

refresh();
setInterval(refresh, 5*60*1000);
</script>
</body>
</html>
